<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galeria Wtyczek Weeb CLI</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header class="navbar">
        <div class="container nav-content">
            <div class="logo">
                <i class="fas fa-puzzle-piece"></i> Weeb CLI Plugins
            </div>
            <div class="search-bar">
                <i class="fas fa-search"></i>
                <input type="text" id="search-input" placeholder="Szukaj wtyczek...">
            </div>
            <div class="controls">
                <button id="theme-toggle" class="icon-btn"><i class="fas fa-moon"></i></button>
            </div>
        </div>
    </header>

    <main class="container">
        <section class="hero">
            <h1>Odkrywaj i Rozszerzaj</h1>
            <p>Niestandardowi dostawcy i narzędzia dla Weeb CLI z bezpieczną piaskownicą.</p>
        </section>

        <section class="filters">
            <div class="filter-group">
                <button class="filter-btn active" data-filter="all">Wszystkie</button>
                <button class="filter-btn" data-filter="provider">Dostawcy</button>
                <button class="filter-btn" data-filter="utility">Narzędzia</button>
                <button class="filter-btn" data-filter="ui">Interfejs</button>
            </div>
            <div class="sort-group">
                <select id="sort-select">
                    <option value="downloads">Najczęściej pobierane</option>
                    <option value="rating">Najwyżej oceniane</option>
                    <option value="recent">Najnowsze</option>
                </select>
            </div>
        </section>

        <section id="plugins-grid" class="grid">
            <!-- Plugins will be rendered here via JS -->
            <div class="loader-container"><div class="loader"></div></div>
        </section>
    </main>

    <!-- Plugin Details Modal -->
    <div id="plugin-modal" class="modal">
        <div class="modal-content">
            <button class="close-modal"><i class="fas fa-times"></i></button>
            <div id="modal-body"></div>
        </div>
    </div>

    <!-- Notification Toast -->
    <div id="toast" class="toast"></div>

    <script src="js/gallery.js"></script>
</body>
</html>
