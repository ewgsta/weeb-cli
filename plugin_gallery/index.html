<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weeb CLI Plugin Gallery</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" id="theme-link" href="css/themes/dark.css">
</head>
<body>
    <header>
        <div class="container">
            <h1>Weeb CLI Plugins</h1>
            <nav>
                <div class="lang-selector">
                    <select id="lang-select">
                        <option value="en">English</option>
                        <option value="tr">Türkçe</option>
                        <option value="de">Deutsch</option>
                        <option value="fr">Français</option>
                        <option value="pl">Polski</option>
                    </select>
                </div>
                <div class="theme-selector">
                    <button id="theme-toggle">🌓</button>
                </div>
            </nav>
        </div>
    </header>

    <main class="container">
        <section id="hero">
            <h2 data-i18n="hero-title">Discover and Extend</h2>
            <p data-i18n="hero-desc">Custom providers and tools for Weeb CLI.</p>
        </section>

        <section id="plugins-grid">
            <!-- Plugins will be rendered here -->
            <div id="loader" class="loader"></div>
        </section>
    </main>

    <div id="modal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <div id="modal-body"></div>
        </div>
    </div>

    <footer>
        <div class="container">
            <p>&copy; 2024 Weeb CLI. Built with passion for the anime community.</p>
        </div>
    </footer>

    <script src="js/gallery.js"></script>
</body>
</html>
