name: Build Release Binaries

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

jobs:
  build_binaries:
    name: Build Portable Binaries
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux x86_64
          - os: ubuntu-22.04
            arch: x64
            artifact_name: weeb-cli-linux-x86_64
            binary_name: weeb-cli
            
          # Windows x86_64
          - os: windows-latest
            arch: x64
            artifact_name: weeb-cli-windows-x86_64.exe
            binary_name: weeb-cli.exe
            
          # Windows x86 (32-bit)
          - os: windows-latest
            arch: x86
            artifact_name: weeb-cli-windows-x86.exe
            binary_name: weeb-cli.exe
            
          # macOS Intel
          - os: macos-13
            arch: x64
            artifact_name: weeb-cli-macos-x86_64
            binary_name: weeb-cli
            target_arch: x86_64
            
          # macOS Apple Silicon
          - os: macos-14
            arch: arm64
            artifact_name: weeb-cli-macos-arm64
            binary_name: weeb-cli
            target_arch: arm64
            
    steps:
      - uses: actions/checkout@v6
      
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          architecture: ${{ matrix.os == 'windows-latest' && matrix.arch || 'x64' }}
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install -e .
          
      - name: Ensure data directories exist
        shell: bash
        run: |
          mkdir -p weeb_cli/locales
          mkdir -p weeb_cli/templates
          
      - name: Build with PyInstaller
        shell: bash
        run: |
          if [ "${{ runner.os }}" = "Windows" ]; then
            SEP=";"
          else
            SEP=":"
          fi
          
          # macOS için target architecture ayarla
          if [ "${{ runner.os }}" = "macOS" ]; then
            export ARCHFLAGS="-arch ${{ matrix.target_arch }}"
            export _PYTHON_HOST_PLATFORM="macosx-10.9-${{ matrix.target_arch }}"
          fi
          
          pyinstaller --name weeb-cli \
            --onefile \
            --clean \
            --noconfirm \
            --add-data "weeb_cli/locales${SEP}weeb_cli/locales" \
            --add-data "weeb_cli/templates${SEP}weeb_cli/templates" \
            --hidden-import weeb_cli.commands.api \
            --hidden-import weeb_cli.commands.downloads \
            --hidden-import weeb_cli.commands.library \
            --hidden-import weeb_cli.commands.search \
            --hidden-import weeb_cli.commands.serve \
            --hidden-import weeb_cli.commands.settings \
            --hidden-import weeb_cli.commands.setup \
            --hidden-import weeb_cli.commands.watchlist \
            --hidden-import weeb_cli.providers.tr.animecix \
            --hidden-import weeb_cli.providers.tr.turkanime \
            --hidden-import weeb_cli.providers.tr.anizle \
            --hidden-import weeb_cli.providers.tr.weeb \
            --hidden-import weeb_cli.providers.en.hianime \
            --hidden-import weeb_cli.providers.en.allanime \
            --hidden-import weeb_cli.providers.de.aniworld \
            --hidden-import weeb_cli.providers.pl.docchi \
            --collect-all curl_cffi \
            --copy-metadata typer \
            --copy-metadata rich \
            --copy-metadata questionary \
            --copy-metadata curl_cffi \
            ${{ runner.os == 'macOS' && format('--target-arch={0}', matrix.target_arch) || '' }} \
            weeb_cli/__main__.py
        
      - name: Rename Binary
        shell: bash
        run: |
          mv dist/${{ matrix.binary_name }} dist/${{ matrix.artifact_name }}

      - name: Upload Artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/${{ matrix.artifact_name }}
          compression-level: 9

  build_appimage:
    name: Build AppImage (Linux)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6
      
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y fuse libfuse2
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install -e .
          
      - name: Download AppImage tools
        run: |
          wget -q https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x appimagetool-x86_64.AppImage
          
      - name: Ensure data directories exist
        run: |
          mkdir -p weeb_cli/locales
          mkdir -p weeb_cli/templates

      - name: Build with PyInstaller
        run: |
          pyinstaller --name weeb-cli \
            --onefile \
            --clean \
            --noconfirm \
            --add-data "weeb_cli/locales:weeb_cli/locales" \
            --add-data "weeb_cli/templates:weeb_cli/templates" \
            --hidden-import weeb_cli.commands.api \
            --hidden-import weeb_cli.commands.downloads \
            --hidden-import weeb_cli.commands.library \
            --hidden-import weeb_cli.commands.search \
            --hidden-import weeb_cli.commands.serve \
            --hidden-import weeb_cli.commands.settings \
            --hidden-import weeb_cli.commands.setup \
            --hidden-import weeb_cli.commands.watchlist \
            --hidden-import weeb_cli.providers.tr.animecix \
            --hidden-import weeb_cli.providers.tr.turkanime \
            --hidden-import weeb_cli.providers.tr.anizle \
            --hidden-import weeb_cli.providers.tr.weeb \
            --hidden-import weeb_cli.providers.en.hianime \
            --hidden-import weeb_cli.providers.en.allanime \
            --hidden-import weeb_cli.providers.de.aniworld \
            --hidden-import weeb_cli.providers.pl.docchi \
            --collect-all curl_cffi \
            --copy-metadata typer \
            --copy-metadata rich \
            --copy-metadata questionary \
            --copy-metadata curl_cffi \
            weeb_cli/__main__.py
            
      - name: Create AppDir structure
        run: |
          mkdir -p AppDir/usr/bin
          mkdir -p AppDir/usr/share/applications
          mkdir -p AppDir/usr/share/icons/hicolor/256x256/apps
          cp dist/weeb-cli AppDir/usr/bin/
          
          cat > AppDir/usr/share/applications/weeb-cli.desktop << 'EOF'
          [Desktop Entry]
          Name=Weeb CLI
          Exec=weeb-cli
          Icon=weeb-cli
          Type=Application
          Categories=Utility;AudioVideo;
          Terminal=true
          EOF
          
          cat > AppDir/AppRun << 'EOF'
          #!/bin/bash
          SELF=$(readlink -f "$0")
          HERE=${SELF%/*}
          export PATH="${HERE}/usr/bin:${PATH}"
          exec "${HERE}/usr/bin/weeb-cli" "$@"
          EOF
          chmod +x AppDir/AppRun
          
      - name: Build AppImage
        run: |
          ARCH=x86_64 ./appimagetool-x86_64.AppImage AppDir weeb-cli-linux-x86_64.AppImage
          chmod +x weeb-cli-linux-x86_64.AppImage
          
      - name: Upload AppImage
        uses: actions/upload-artifact@v7
        with:
          name: weeb-cli-linux-x86_64.AppImage
          path: weeb-cli-linux-x86_64.AppImage
          compression-level: 9

  upload_to_release:
    name: Upload to Release (${{ matrix.artifact_name }})
    needs: build_binaries
    runs-on: ubuntu-latest
    if: always() && needs.build_binaries.result != 'cancelled'
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        artifact_name:
          - weeb-cli-linux-x86_64
          - weeb-cli-windows-x86_64.exe
          - weeb-cli-windows-x86.exe
          - weeb-cli-macos-x86_64
          - weeb-cli-macos-arm64
    steps:
      - name: Download Artifact
        uses: actions/download-artifact@v8
        continue-on-error: true
        with:
          name: ${{ matrix.artifact_name }}
          path: artifact
          
      - name: Generate Checksum
        if: hashFiles('artifact/*') != ''
        run: |
          cd artifact
          sha256sum * > ${{ matrix.artifact_name }}.sha256
          cat ${{ matrix.artifact_name }}.sha256
          
      - name: Upload to Release
        if: hashFiles('artifact/*') != ''
        uses: softprops/action-gh-release@v3
        with:
          files: |
            artifact/${{ matrix.artifact_name }}
            artifact/${{ matrix.artifact_name }}.sha256
          fail_on_unmatched_files: false

  upload_appimage_to_release:
    name: Upload AppImage to Release
    needs: build_appimage
    runs-on: ubuntu-latest
    if: always() && needs.build_appimage.result == 'success'
    permissions:
      contents: write
    steps:
      - name: Download AppImage
        uses: actions/download-artifact@v8
        with:
          name: weeb-cli-linux-x86_64.AppImage
          path: artifact
          
      - name: Generate Checksum
        run: |
          cd artifact
          sha256sum * > weeb-cli-linux-x86_64.AppImage.sha256
          cat weeb-cli-linux-x86_64.AppImage.sha256
          
      - name: Upload to Release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            artifact/weeb-cli-linux-x86_64.AppImage
            artifact/weeb-cli-linux-x86_64.AppImage.sha256
          fail_on_unmatched_files: false
