name: Publish Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  pypi_publish:
    name: Upload release to PyPI
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/weeb-cli
    permissions:
      id-token: write  
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build
          
      - name: Build package
        run: python -m build
        
      - name: Publish package distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          attestations: false

  build_binaries:
    name: Build Binaries
    needs: pypi_publish 
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            arch: x64
            artifact_name: weeb-cli-Linux-x86_64
            binary_name: weeb-cli
          - os: windows-latest
            arch: x64
            artifact_name: weeb-cli-Windows-x86_64.exe
            binary_name: weeb-cli.exe
          - os: windows-latest
            arch: x86
            artifact_name: weeb-cli-Windows-x86.exe
            binary_name: weeb-cli.exe
          - os: macos-15 # Intel 
            arch: x64
            artifact_name: weeb-cli-macOS-x86_64
            binary_name: weeb-cli
          - os: macos-latest # ARM 
            arch: arm64
            artifact_name: weeb-cli-macOS-arm64
            binary_name: weeb-cli
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          architecture: ${{ matrix.arch }} 
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install . pyinstaller
          
      - name: Build with PyInstaller
        shell: bash
        run: |
          # Use ; as separator for Windows and : for Unix
          if [ "${{ runner.os }}" = "Windows" ]; then
            SEP=";"
          else
            SEP=":"
          fi
          pyinstaller --name weeb-cli --onefile --clean --noconfirm \
            --icon weeb_landing/logo/favicon.ico \
            --add-data "weeb_cli/locales${SEP}weeb_cli/locales" \
            --add-data "weeb_cli/templates${SEP}weeb_cli/templates" \
            --collect-all rich \
            --collect-all questionary \
            --collect-all typer \
            --collect-all certifi \
            --collect-all curl_cffi \
            --hidden-import weeb_cli.commands.api \
            --hidden-import weeb_cli.commands.downloads \
            --hidden-import weeb_cli.commands.library \
            --hidden-import weeb_cli.commands.search \
            --hidden-import weeb_cli.commands.serve \
            --hidden-import weeb_cli.commands.settings \
            --hidden-import weeb_cli.commands.setup \
            --hidden-import weeb_cli.commands.watchlist \
            weeb_cli/__main__.py
        
      - name: Rename Binary
        shell: bash
        run: |
          mv dist/${{ matrix.binary_name }} dist/${{ matrix.artifact_name }}

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.artifact_name }}
          path: dist/${{ matrix.artifact_name }}

  # AppImage build for Linux (portable)
  build_appimage:
    name: Build AppImage
    needs: pypi_publish
    runs-on: ubuntu-20.04  # Use older Ubuntu for better compatibility
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y fuse libfuse2
          python -m pip install --upgrade pip
          pip install . pyinstaller
          
      - name: Download AppImage tools
        run: |
          wget https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x appimagetool-x86_64.AppImage
          
      - name: Build with PyInstaller
        run: |
          pyinstaller --name weeb-cli --onefile --clean --noconfirm \
            --icon weeb_landing/logo/favicon.ico \
            --add-data "weeb_cli/locales:weeb_cli/locales" \
            --add-data "weeb_cli/templates:weeb_cli/templates" \
            --collect-all rich \
            --collect-all questionary \
            --collect-all typer \
            --collect-all certifi \
            --collect-all curl_cffi \
            --hidden-import weeb_cli.commands.api \
            --hidden-import weeb_cli.commands.downloads \
            --hidden-import weeb_cli.commands.library \
            --hidden-import weeb_cli.commands.search \
            --hidden-import weeb_cli.commands.serve \
            --hidden-import weeb_cli.commands.settings \
            --hidden-import weeb_cli.commands.setup \
            --hidden-import weeb_cli.commands.watchlist \
            weeb_cli/__main__.py
            
      - name: Create AppDir structure
        run: |
          mkdir -p AppDir/usr/bin
          mkdir -p AppDir/usr/share/applications
          mkdir -p AppDir/usr/share/icons/hicolor/256x256/apps
          
          # Copy binary
          cp dist/weeb-cli AppDir/usr/bin/
          
          # Create desktop file
          cat > AppDir/usr/share/applications/weeb-cli.desktop << EOF
          [Desktop Entry]
          Name=Weeb CLI
          Exec=weeb-cli
          Icon=weeb-cli
          Type=Application
          Categories=Utility;
          Terminal=true
          EOF
          
          # Copy icon (convert ico to png if needed)
          cp weeb_landing/logo/favicon.ico AppDir/usr/share/icons/hicolor/256x256/apps/weeb-cli.png || true
          
          # Create AppRun
          cat > AppDir/AppRun << 'EOF'
          #!/bin/bash
          SELF=$(readlink -f "$0")
          HERE=${SELF%/*}
          export PATH="${HERE}/usr/bin:${PATH}"
          exec "${HERE}/usr/bin/weeb-cli" "$@"
          EOF
          chmod +x AppDir/AppRun
          
      - name: Build AppImage
        run: |
          ARCH=x86_64 ./appimagetool-x86_64.AppImage AppDir weeb-cli-x86_64.AppImage
          chmod +x weeb-cli-x86_64.AppImage
          
      - name: Upload AppImage
        uses: actions/upload-artifact@v4
        with:
          name: binary-weeb-cli-x86_64.AppImage
          path: weeb-cli-x86_64.AppImage

  # Snap package for Linux
  build_snap:
    name: Build Snap Package
    needs: pypi_publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Create snapcraft.yaml
        run: |
          mkdir -p snap
          cat > snap/snapcraft.yaml << EOF
          name: weeb-cli
          base: core22
          version: '${GITHUB_REF_NAME#v}'
          summary: Terminal-based anime streaming and downloading
          description: |
            Weeb CLI is a powerful terminal application for streaming and downloading anime.
            Features include multi-source support, download management, and tracker integration.
          
          grade: stable
          confinement: strict
          
          apps:
            weeb-cli:
              command: bin/weeb-cli
              plugs:
                - home
                - network
                - network-bind
          
          parts:
            weeb-cli:
              plugin: python
              source: .
              python-packages:
                - .
              stage-packages:
                - libffi7
                - libssl3
          EOF
          
      - name: Build Snap
        uses: snapcore/action-build@v1
        id: build
        
      - name: Upload Snap
        uses: actions/upload-artifact@v4
        with:
          name: snap-weeb-cli
          path: ${{ steps.build.outputs.snap }}

  # Flatpak for Linux
  build_flatpak:
    name: Build Flatpak
    needs: pypi_publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Flatpak and flatpak-builder
        run: |
          sudo apt-get update
          sudo apt-get install -y flatpak flatpak-builder
          
      - name: Create Flatpak manifest
        run: |
          cat > io.github.ewgsta.weeb-cli.yml << EOF
          app-id: io.github.ewgsta.weeb-cli
          runtime: org.freedesktop.Platform
          runtime-version: '23.08'
          sdk: org.freedesktop.Sdk
          command: weeb-cli
          
          finish-args:
            - --share=network
            - --share=ipc
            - --socket=x11
            - --socket=wayland
            - --filesystem=home
          
          modules:
            - name: python3-pip
              buildsystem: simple
              build-commands:
                - pip3 install --prefix=/app weeb-cli==${GITHUB_REF_NAME#v}
          EOF
          
      - name: Build Flatpak
        run: |
          flatpak-builder --repo=repo --force-clean build-dir io.github.ewgsta.weeb-cli.yml
          flatpak build-bundle repo weeb-cli.flatpak io.github.ewgsta.weeb-cli
          
      - name: Upload Flatpak
        uses: actions/upload-artifact@v4
        with:
          name: flatpak-weeb-cli
          path: weeb-cli.flatpak

  # Homebrew formula update
  homebrew_publish:
    name: Update Homebrew Formula
    needs: pypi_publish
    runs-on: ubuntu-latest
    if: github.repository == 'ewgsta/weeb-cli'  # Only run on main repo
    steps:
      - uses: actions/checkout@v4
      
      - name: Create Homebrew Formula
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          
          # Download source tarball to calculate SHA256
          wget https://github.com/ewgsta/weeb-cli/archive/refs/tags/${GITHUB_REF_NAME}.tar.gz
          SHA256=$(sha256sum ${GITHUB_REF_NAME}.tar.gz | awk '{print $1}')
          
          mkdir -p distribution/homebrew
          cat > distribution/homebrew/weeb-cli.rb << EOF
          class WeebCli < Formula
            desc "Terminal-based anime streaming and downloading"
            homepage "https://github.com/ewgsta/weeb-cli"
            url "https://github.com/ewgsta/weeb-cli/archive/refs/tags/${GITHUB_REF_NAME}.tar.gz"
            sha256 "${SHA256}"
            license "GPL-3.0"
          
            depends_on "python@3.12"
            depends_on "mpv"
          
            def install
              virtualenv_install_with_resources
            end
          
            test do
              system "#{bin}/weeb-cli", "--version"
            end
          end
          EOF
          
      - name: Commit and push formula
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add distribution/homebrew/weeb-cli.rb
          git commit -m "Update Homebrew formula to ${GITHUB_REF_NAME}" || true
          git push || true

  # Scoop manifest for Windows
  scoop_publish:
    name: Update Scoop Manifest
    needs: build_binaries
    runs-on: ubuntu-latest
    if: github.repository == 'ewgsta/weeb-cli'
    steps:
      - uses: actions/checkout@v4
      
      - name: Download Windows binary
        uses: actions/download-artifact@v4
        with:
          name: binary-weeb-cli-Windows-x86_64.exe
          path: artifacts
          
      - name: Create Scoop Manifest
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          URL="https://github.com/ewgsta/weeb-cli/releases/download/${GITHUB_REF_NAME}/weeb-cli-Windows-x86_64.exe"
          
          # Calculate hash
          HASH=$(sha256sum artifacts/weeb-cli-Windows-x86_64.exe | awk '{print $1}')
          
          mkdir -p distribution/scoop
          cat > distribution/scoop/weeb-cli.json << EOF
          {
            "version": "${VERSION}",
            "description": "Terminal-based anime streaming and downloading",
            "homepage": "https://github.com/ewgsta/weeb-cli",
            "license": "GPL-3.0",
            "url": "${URL}",
            "hash": "${HASH}",
            "bin": "weeb-cli-Windows-x86_64.exe",
            "shortcuts": [
              ["weeb-cli-Windows-x86_64.exe", "Weeb CLI"]
            ],
            "checkver": {
              "github": "https://github.com/ewgsta/weeb-cli"
            },
            "autoupdate": {
              "url": "https://github.com/ewgsta/weeb-cli/releases/download/v\$version/weeb-cli-Windows-x86_64.exe"
            }
          }
          EOF
          
      - name: Commit and push manifest
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add distribution/scoop/weeb-cli.json
          git commit -m "Update Scoop manifest to ${GITHUB_REF_NAME}" || true
          git push || true

  # Winget manifest for Windows
  winget_publish:
    name: Update Winget Manifest
    needs: build_binaries
    runs-on: ubuntu-latest
    if: github.repository == 'ewgsta/weeb-cli'
    steps:
      - uses: actions/checkout@v4
      
      - name: Create Winget Manifest
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          
          mkdir -p distribution/winget
          cat > distribution/winget/ewgsta.weeb-cli.yaml << EOF
          PackageIdentifier: ewgsta.weeb-cli
          PackageVersion: ${VERSION}
          PackageName: Weeb CLI
          Publisher: ewgsta
          License: GPL-3.0
          LicenseUrl: https://github.com/ewgsta/weeb-cli/blob/main/LICENSE
          ShortDescription: Terminal-based anime streaming and downloading
          PackageUrl: https://github.com/ewgsta/weeb-cli
          Installers:
            - Architecture: x64
              InstallerType: exe
              InstallerUrl: https://github.com/ewgsta/weeb-cli/releases/download/${GITHUB_REF_NAME}/weeb-cli-Windows-x86_64.exe
              InstallerSha256: TO_BE_CALCULATED
          ManifestType: singleton
          ManifestVersion: 1.0.0
          EOF
          
      - name: Commit manifest
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add distribution/winget/
          git commit -m "Update Winget manifest to ${GITHUB_REF_NAME}" || true
          git push || true

  aur_publish:
    name: Publish to AUR
    needs: pypi_publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Update PKGBUILD version
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          sed -i "s/^pkgver=.*/pkgver=$VERSION/" distribution/aur/PKGBUILD
          
      - name: Publish to AUR
        uses: KSXGitHub/github-actions-deploy-aur@v2.7.2
        with:
          pkgname: weeb-cli
          pkgbuild: ./distribution/aur/PKGBUILD
          commit_username: ${{ secrets.AUR_USERNAME }}
          commit_email: ${{ secrets.AUR_EMAIL }}
          ssh_private_key: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
          commit_message: Update to ${{ github.ref_name }}
          force_push: true

  release:
    name: Create GitHub Release
    needs: [build_binaries, build_appimage, build_snap, build_flatpak]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: binary-*
          merge-multiple: true
          
      - name: Download Snap
        uses: actions/download-artifact@v4
        with:
          name: snap-weeb-cli
          path: artifacts
          
      - name: Download Flatpak
        uses: actions/download-artifact@v4
        with:
          name: flatpak-weeb-cli
          path: artifacts
          
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            artifacts/*
          generate_release_notes: true
          body: |
            ## Installation Methods
            
            ### Package Managers
            - **PyPI**: `pip install weeb-cli`
            - **AUR** (Arch Linux): `yay -S weeb-cli`
            - **Homebrew** (macOS): `brew install ewgsta/tap/weeb-cli`
            - **Scoop** (Windows): `scoop bucket add ewgsta https://github.com/ewgsta/scoop-bucket && scoop install weeb-cli`
            - **Snap** (Linux): `snap install weeb-cli`
            - **Flatpak** (Linux): Download `.flatpak` file and run `flatpak install weeb-cli.flatpak`
            
            ### Portable Binaries
            - **Linux**: Download `weeb-cli-Linux-x86_64` or `weeb-cli-x86_64.AppImage`
            - **Windows**: Download `weeb-cli-Windows-x86_64.exe`
            - **macOS**: Download `weeb-cli-macOS-x86_64` (Intel) or `weeb-cli-macOS-arm64` (Apple Silicon)
            
            ### From Source
            ```bash
            git clone https://github.com/ewgsta/weeb-cli
            cd weeb-cli
            pip install .
            ```
