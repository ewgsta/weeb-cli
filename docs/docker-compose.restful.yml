version: '3.8'

services:
  weeb-cli-restful:
    image: python:3.12-slim
    container_name: weeb-cli-restful
    command: >
      sh -c "apt-get update && 
             apt-get install -y --no-install-recommends gcc && 
             rm -rf /var/lib/apt/lists/* && 
             pip install --no-cache-dir weeb-cli[serve-restful] && 
             weeb-cli serve restful"
    ports:
      - "8080:8080"
    environment:
      - RESTFUL_PORT=8080
      - RESTFUL_HOST=0.0.0.0
      - RESTFUL_CORS=true
      - RESTFUL_DEBUG=false
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:8080/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
